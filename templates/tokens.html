<!DOCTYPE html>
<html>
<head>
    <title>OAuth Tokens</title>
</head>
<body>

<h2>OAuth Token Response</h2>

<h3>Access Token</h3>
<pre>{{ access_token }}</pre>

<h3>ID Token</h3>
<pre>{{ id_token }}</pre>

<h3>Refresh Token</h3>
<pre>{{ refresh_token }}</pre>

<a href="/profile">View User Profile</a>

</body>
</html>
